name: Transform localization JSON

on:
  push:
    branches:
      - service

permissions:
  contents: write

jobs:
  transform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout service branch
        uses: actions/checkout@v4
        with:
          ref: service
          fetch-depth: 0

      - name: Set Git config
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Transform localization files
        run: |
          node <<'EOF'
          const fs = require('fs');

          const files = fs.readdirSync('.')
            .filter(f => f.endsWith('.json'));

          for (const file of files) {
            console.log(`Processing ${file}`);

            let input;
            try {
              input = JSON.parse(fs.readFileSync(file, 'utf8'));
            } catch (e) {
              console.log(`Skipping ${file} (invalid JSON)`);
              continue;
            }

            // If it's already transformed (object instead of array), skip
            if (!Array.isArray(input)) {
              console.log(`Skipping ${file} (already transformed)`);
              continue;
            }

            const output = {};

            for (const item of input) {
              if (!item.identifier) continue;

              const keys = item.identifier.split('.');
              let current = output;

              for (let i = 0; i < keys.length - 1; i++) {
                if (!current[keys[i]]) current[keys[i]] = {};
                current = current[keys[i]];
              }

              const lastKey = keys[keys.length - 1];

              current[lastKey] =
                item.translation ||
                item.source_string ||
                "";
            }

            fs.writeFileSync(file, JSON.stringify(output, null, 2));
          }
          EOF

      - name: Commit changes
        run: |
          git add *.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto-transform localization JSON format"
          git push origin service
