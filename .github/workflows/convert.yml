name: Convert Localization Files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  transform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Git config
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Checkout service branch
        run: git checkout service

      - name: Run transformation script for all JSON files
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');
      
          const files = fs.readdirSync('.').filter(f => f.endsWith('.json'));
      
          for (const file of files) {
            console.log(`Processing ${file}...`);
      
            const input = JSON.parse(fs.readFileSync(file, 'utf8'));
            const output = {};
      
            for (const item of input) {
              if (!item.identifier) continue;
      
              const keys = item.identifier.split('.');
              let current = output;
      
              for (let i = 0; i < keys.length - 1; i++) {
                if (!current[keys[i]]) current[keys[i]] = {};
                current = current[keys[i]];
              }
      
              current[keys[keys.length - 1]] =
                item.translation || item.source_string || "";
            }
      
            // overwrite the same file (or change name if you prefer)
            fs.writeFileSync(file, JSON.stringify(output, null, 2));
          }
          EOF

      - name: Switch to target branch
        run: |
          git checkout dev || git checkout -b dev

      - name: Commit and push
        run: |
          git add .
          git commit -m "Chore: convert l10n messages from Crowdin JSON to Next-INTL JSON" || echo "No changes"
          git push origin dev
